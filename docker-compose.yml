services:
  light-service-1:
    build:
      context: ./light-service
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
    volumes:
      - ./light-service:/app
    restart: unless-stopped

  light-service-2:
    build:
      context: ./light-service
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      HOST: "0.0.0.0"
    volumes:
      - ./light-service:/app
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./api-gateway:/app
    restart: unless-stopped
    depends_on:
      - light-service-1
      - light-service-2

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "nCT8rKDqToCJ8Uw_RSN45Q"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.authorizer.logger=WARN,kafka.network.RequestChannel$=WARN,kafka.request.logger=WARN"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  heavy-service:
    build:
      context: ./heavy-service
      dockerfile: Dockerfile.dev
    ports:
      - "3010:3010"
    environment:
      PORT: "3010"
      HOST: "0.0.0.0"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "heavy-service"
      WORK_TOPIC: "heavy-work"
      REPLY_TOPIC: "heavy-reply"
      REPLY_CONSUMER_GROUP: "heavy-service-replies"
      REPLY_TIMEOUT_MS: "15000"
      REDIS_URL: "redis://redis:6379"
      JOB_REQUESTS_TOPIC: "job.requests"
    volumes:
      - ./heavy-service:/app
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  heavy-worker-1:
    build:
      context: ./heavy-worker
      dockerfile: Dockerfile.dev
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "heavy-worker-1"
      WORK_TOPIC: "heavy-work"
      REPLY_TOPIC: "heavy-reply"
      GROUP_ID: "heavy-workers"
      WORKER_ID: "worker-1"
      WORK_DELAY_MS: "10000"
    volumes:
      - ./heavy-worker:/app
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy

  heavy-worker-2:
    build:
      context: ./heavy-worker
      dockerfile: Dockerfile.dev
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "heavy-worker-2"
      WORK_TOPIC: "heavy-work"
      REPLY_TOPIC: "heavy-reply"
      GROUP_ID: "heavy-workers"
      WORKER_ID: "worker-2"
      WORK_DELAY_MS: "10000"
    volumes:
      - ./heavy-worker:/app
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
