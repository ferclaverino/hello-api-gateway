services:
  light-service-1:
    build:
      context: ./light-service
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
    volumes:
      - ./light-service:/app
      - /app/node_modules
    restart: unless-stopped

  light-service-2:
    build:
      context: ./light-service
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      HOST: "0.0.0.0"
    volumes:
      - ./light-service:/app
      - /app/node_modules
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - light-service-1
      - light-service-2
